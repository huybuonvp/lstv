name: Update

on:
  schedule:
    - cron: '*/8 * * * *'   # chạy mỗi 10 phút
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip & pycache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            __pycache__
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests==2.32.3 beautifulsoup4==4.12.3

      - name: Run script
        run: |
          python ScraperLSTV.py

      - name: Commit & Push if changed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add tv.m3u tv.json mon.json

          git diff --cached --quiet || git commit -m "update m3u fast [skip ci]" --no-verify
          git push origin HEAD:main || (git commit --amend --no-edit && git push origin HEAD:main)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: m3u-json-files
          path: |
            tv.m3u
            tv.json
            mon.json
